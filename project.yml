name: SoundBridge
options:
  bundleIdPrefix: com.soundbridge
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

packages:
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    from: "1.19.0"
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.30.6"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "2.30.6"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: 7Z4556KSRK
    CODE_SIGN_STYLE: Automatic

targets:
  SoundBridge-iPhone:
    type: application
    platform: iOS
    sources:
      - path: SoundBridge-iPhone
      - path: Shared
      - path: models/model_int8.onnx
        buildPhase: resources
      - path: models/punc_vocab.json
        buildPhase: resources
    dependencies:
      - package: onnxruntime
        product: onnxruntime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhiweipeng.soundbridge.phone.codex7z
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SoundBridge-iPhone/Info.plist
    info:
      path: SoundBridge-iPhone/Info.plist
      properties:
        CFBundleDisplayName: SoundBridge Codex
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "SoundBridge 需要麦克风权限来进行语音识别"
        NSSpeechRecognitionUsageDescription: "SoundBridge 需要语音识别权限来将语音转为文字"
        NSLocalNetworkUsageDescription: "SoundBridge 需要本地网络来连接附近的 iPad"
        NSBonjourServices:
          - "_sbcodex._tcp"
        UIBackgroundModes:
          - audio

  SoundBridge-iPad:
    type: application
    platform: iOS
    sources:
      - path: SoundBridge-iPad
      - path: Shared
      - path: models/qwen2.5-3b-4bit
        excludes:
          - .cache
        buildPhase: resources
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhiweipeng.soundbridge.pad.codex7z
        TARGETED_DEVICE_FAMILY: "2"
        INFOPLIST_FILE: SoundBridge-iPad/Info.plist
    info:
      path: SoundBridge-iPad/Info.plist
      properties:
        CFBundleDisplayName: SoundBridge Codex
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "SoundBridge 需要本地网络来接收来自 iPhone 的语音文字"
        NSBonjourServices:
          - "_sbcodex._tcp"
